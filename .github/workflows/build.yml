name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --locked

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          tag=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          docker run --rm "$tag" /usr/local/bin/dnsix --help

      - name: Export LXC rootfs
        run: |
          tag=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          cid=$(docker create "$tag")
          docker export "$cid" | gzip -9 > dnsix-lxc-rootfs.tar.gz
          docker rm "$cid"
          ls -lh dnsix-lxc-rootfs.tar.gz

      - name: Upload LXC rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnsix-lxc-rootfs
          path: dnsix-lxc-rootfs.tar.gz

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done <<< '${{ steps.meta.outputs.tags }}'

      - name: Attach rootfs to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dnsix-lxc-rootfs.tar.gz
